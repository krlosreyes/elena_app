name: elena_app
description: "Sistema de Alineación Biológica - MVP"
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  state_notifier: ^1.0.0

  # Navigation
  go_router: ^17.1.0

  # Backend
  firebase_core: ^4.5.0
  firebase_auth: ^6.0.0
  cloud_firestore: ^6.0.0
  cloud_functions: ^6.0.7
  firebase_app_check: ^0.4.1+5

  # Utilities
  intl: ^0.20.2
  uuid: ^4.3.3
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1 # Versión estable
  json_annotation: ^4.9.0    # Versión estable

  # Security & UI
  flutter_secure_storage: ^10.0.0
  permission_handler: ^12.0.1
  logger: ^2.4.0
  shared_preferences: ^2.5.4
  flutter_local_notifications: ^21.0.0
  flutter_svg: ^2.2.4
  timezone: ^0.11.0
  flutter_screenutil: ^5.9.3
  rxdart: ^0.28.0
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.4.1
  freezed: ^2.4.7 # Versión estable compatible con annotation 2.4.1
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/