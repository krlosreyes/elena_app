name: elena_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^17.1.0

  # Backend
  # Backend
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.0
  cloud_firestore: ^6.0.0

  # Utilities
  intl: ^0.20.2
  uuid: ^4.3.3
  equatable: ^2.0.5
  google_fonts: ^8.0.2
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

  # UI
  flutter_animate: ^4.5.0
  shared_preferences: ^2.5.4
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.4
  # flutter_local_notifications_platform_interface: ^11.0.0-dev.1
  fl_chart: ^1.1.1
  confetti: ^0.8.0
  state_notifier: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

  # Code Generation
  build_runner: ^2.4.8
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  json_serializable: ^6.7.1

  # Linting
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.7

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21 # Optimización para Android modernos
  adaptive_icon_background: "#ffffff" # O el color de fondo de tu marca (Hex)
  adaptive_icon_foreground: "assets/icon/icon.png"
  remove_alpha_ios: true
